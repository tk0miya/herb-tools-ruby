name: RBS collection

on:
  schedule:
    - cron: '00 8 * * MON'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: app-token
      with:
        app-id: ${{ vars.REPO_HOUSEKEEPER_APP_ID }}
        private-key: ${{ secrets.REPO_HOUSEKEEPER_PRIVATE_KEY }}
        permission-contents: write
        permission-pull-requests: write
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Set up Ruby (herb-config)
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      with:
        ruby-version: ruby
        bundler-cache: true
        working-directory: herb-config
    - name: Set up Ruby (herb-core)
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      with:
        ruby-version: ruby
        bundler-cache: true
        working-directory: herb-core
    - name: Set up Ruby (herb-printer)
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      with:
        ruby-version: ruby
        bundler-cache: true
        working-directory: herb-printer
    - name: Set up Ruby (herb-lint)
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      with:
        ruby-version: ruby
        bundler-cache: true
        working-directory: herb-lint
    - name: Set up Ruby (herb-format)
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      with:
        ruby-version: ruby
        bundler-cache: true
        working-directory: herb-format
    - name: Set up Ruby (herb-highlighter)
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      with:
        ruby-version: ruby
        bundler-cache: true
        working-directory: herb-highlighter
    - name: Update rbs collection
      run: |
        for gem_dir in herb-config herb-core herb-printer herb-lint herb-format herb-highlighter; do
          (cd "$gem_dir" && bundle exec rbs collection update)
        done
    - name: Create a pull request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        add-paths: |
          herb-config/rbs_collection.lock.yaml
          herb-core/rbs_collection.lock.yaml
          herb-printer/rbs_collection.lock.yaml
          herb-lint/rbs_collection.lock.yaml
          herb-format/rbs_collection.lock.yaml
          herb-highlighter/rbs_collection.lock.yaml
        commit-message: 'rbs: Update RBS collection'
        branch: bot/rbs-collection
        title: 'rbs: Update RBS collection'
        labels: auto-merge
        token: ${{ steps.app-token.outputs.token }}
