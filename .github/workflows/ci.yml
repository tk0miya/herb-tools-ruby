name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  herb-config:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: herb-config
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
        with:
          ruby-version: '4.0'
          bundler-cache: true
          working-directory: herb-config
      - name: Run all checks
        run: bundle exec rake

  herb-core:
